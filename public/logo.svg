<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Importing the exact brand font (Fraunces) from Google Fonts -->
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300&amp;display=swap');
      .logo-text { 
        font-family: 'Fraunces', serif; 
        font-size: 42px; 
        letter-spacing: -1.2px; 
      }
      .client { 
        fill: #FFFFFF; 
        font-weight: 500; 
      }
      .era { 
        fill: #C49A3C; 
        font-style: italic; 
        font-weight: 300; 
      }
    </style>
  </defs>
  
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="logo-text">
    <tspan class="client">client</tspan><tspan class="era">era</tspan>
  </text>
</svg>
