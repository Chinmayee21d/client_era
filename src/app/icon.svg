<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bgGrad)"/>
  <circle cx="50" cy="50" r="47.5" fill="none" stroke="#c9a84c" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
  <!--
    Georgia 'c' x-height is ~68% of em, descenders negligible for lowercase c.
    Glyph sits mostly above baseline. For font-size=64 in a 100x100 box:
    - x-height ~= 64 * 0.48 = ~31px tall (c has no ascender/descender)
    - Visual center of glyph = baseline - (x-height / 2) = baseline - 15.5
    - To center: baseline = 50 + 15.5 = 65.5 → use y="65"
    - Horizontal: 'c' is slightly narrow, text-anchor=middle at x=50 is correct
  -->
  <text
    x="50"
    y="65"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-style="normal"
    fill="white"
  >c</text>
</svg>